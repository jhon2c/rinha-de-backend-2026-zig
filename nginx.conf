worker_processes 1;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 256;
    }

    server {
        listen 9999 default_server;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}

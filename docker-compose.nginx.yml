
services:
  api1: &api
    build: .
    command: ["8080", "12", "96"]
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "155MB"

  api2:
    <<: *api

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on: [api1, api2]
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "40MB"

networks:
  app:
    driver: bridge
